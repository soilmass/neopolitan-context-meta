name: changelog-and-index
description: >
  changelog-sync (per-skill changelogs vs library CHANGELOG.md) and gen-index
  --check (INDEX.md fresh) must both pass on a release-ready branch.
steps:
  - run: python3 scripts/changelog-sync.py
    expected_exit: 0
  - run: python3 scripts/gen-index.py --check
    expected_exit: 0
