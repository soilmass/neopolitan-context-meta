# routing-eval.yaml — held-out routing-evaluation prompts.
#
# Format per skill-audit/references/routing-eval-protocol.md:
#   - prompt: <natural-language input>
#     expected: <skill-name | none for true negatives>
#     source:   held_out | in_distribution
#     rationale: <why this prompt should fire that skill>
#
# Status (v0.2.0): starter set. The deferred build trigger for the full
# routing-eval suite is "library reaches 25 skills OR first description-
# change regression slips through" — neither has fired. This starter
# exists so:
#   1. skill-audit Stage 4 has a real input format to point at,
#   2. when the build trigger fires, the file is already in place,
#   3. the audit-skill.py runner can probe whether the suite exists.
#
# v0.2.0 has 5 skills and 30 prompts: ~6 positive prompts per skill plus
# negative cases that should NOT route (true negatives). When new skills
# land, append prompts (≥5 positive, ≥3 negative) per
# routing-eval-protocol.md.

